<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Rides | BookMyTaxi Cabs</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #f8f9fa; color: #333; }
        .dashboard-container { max-width: 1000px; margin: 40px auto; padding: 20px; display: grid; grid-template-columns: 240px 1fr; gap: 40px; }
        .dash-sidebar { background: white; padding: 20px; border-radius: 16px; box-shadow: var(--shadow); height: fit-content; }
        .dash-nav-btn { display: block; width: 100%; padding: 12px 16px; border: none; background: none; text-align: left; font-weight: 600; cursor: pointer; border-radius: 8px; margin-bottom: 8px; color: #666; }
        .dash-nav-btn.active { background: var(--primary); color: var(--dark); }
        
        .main-dash { flex: 1; }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 16px; box-shadow: var(--shadow); border-bottom: 4px solid var(--primary); }
        .stat-card h3 { font-size: 12px; text-transform: uppercase; color: #666; margin-bottom: 5px; }
        .stat-card .val { font-size: 24px; font-weight: 800; }

        .ride-card { background: white; padding: 24px; border-radius: 16px; box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid #eee; }
        .ride-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .ride-status { padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .status-completed { background: #e8f5e9; color: #2e7d32; }
        .status-assigned { background: #e3f2fd; color: #1565c0; }
        .status-ongoing { background: #fff8e1; color: #f57f17; }
        .otp-display { background: var(--light-grey); padding: 15px; border-radius: 12px; text-align: center; margin-top: 16px; border: 1px dashed #ccc; }
        .otp-val { font-size: 28px; font-weight: 800; color: var(--dark); display: block; letter-spacing: 4px; }
        
        .tab-section { display: none; }
        .tab-section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        
        @media (max-width: 768px) {
            .dashboard-container { grid-template-columns: 1fr; margin: 20px auto; }
            .dash-sidebar { order: 2; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside class="dash-sidebar">
            <h2 style="font-size: 18px; margin-bottom: 20px;">Menu</h2>
            <button onclick="window.location.href='index.html'" class="dash-nav-btn" style="margin-bottom:20px; border:1px solid var(--border-color); display:flex; align-items:center; gap:8px;">
                <svg viewBox="0 0 24 24" width="18" height="18"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="currentColor"/></svg>
                Back to Booking
            </button>
            <button class="dash-nav-btn active" data-target="rides">My Rides</button>
            <button class="dash-nav-btn" data-target="profile">My Profile</button>
            <button onclick="window.location.href='index.html'" class="dash-nav-btn" style="margin-top:20px; background:var(--primary);">New Ride</button>
            <button onclick="logout()" class="dash-nav-btn" style="color: #ff5252; margin-top: auto;">Logout</button>
        </aside>

        <main class="main-dash">
            <!-- Rides Section -->
            <section id="rides-section" class="tab-section active">
                <header style="margin-bottom: 30px;">
                    <h1>My Dashboard</h1>
                </header>
                
                <div class="stats-row">
                    <div class="stat-card"><h3>Total Rides</h3><div class="val" id="stat-total-rides">0</div></div>
                    <div class="stat-card"><h3>Total Spend</h3><div class="val" id="stat-total-spend">₹0</div></div>
                </div>

                <div id="rides-list">
                    <p class="placeholder-text">Syncing your journey history...</p>
                </div>
            </section>

            <!-- Profile Section -->
            <section id="profile-section" class="tab-section">
                <header style="margin-bottom: 30px;"><h1>My Profile</h1></header>
                <div class="ride-card">
                    <form id="profile-form">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="p-name" required>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="p-email" required>
                        </div>
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="text" id="p-phone" required>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width:100%; padding:14px;">Save Changes</button>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('cityride_member'));
        if (!user) window.location.href = 'auth.html';

        // Tab Switching
        document.querySelectorAll('.dash-nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const target = btn.dataset.target;
                if (!target) return;
                
                document.querySelectorAll('.dash-nav-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
                
                btn.classList.add('active');
                document.getElementById(`${target}-section`).classList.add('active');
            });
        });

        // Load Profile
        document.getElementById('p-name').value = user.name;
        document.getElementById('p-email').value = user.email;
        document.getElementById('p-phone').value = user.phone;

        async function loadRides() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/user/bookings/${user.id}`);
                const rides = await res.json();
                
                // Calculate Stats
                document.getElementById('stat-total-rides').textContent = rides.length;
                const spend = rides.reduce((acc, r) => {
                    if (r.status === 'completed') {
                        return acc + parseFloat(r.fare.replace(/[^0-9.]/g, ''));
                    }
                    return acc;
                }, 0);
                document.getElementById('stat-total-spend').textContent = `₹${Math.ceil(spend)}`;

                renderRides(rides);
            } catch (err) {}
        }

        function renderRides(rides) {
            const container = document.getElementById('rides-list');
            container.innerHTML = '';
            if (!rides.length) {
                container.innerHTML = '<p class="placeholder-text">No rides found. Start your first journey today!</p>';
                return;
            }
            rides.forEach(ride => {
                const card = document.createElement('div');
                card.className = 'ride-card';
                card.innerHTML = `
                    <div class="ride-header">
                        <span class="ride-status status-${ride.status}">${ride.status}</span>
                        <span style="font-weight:800; font-size:18px;">${ride.fare}</span>
                    </div>
                    <div class="ride-info">
                        <p><b>Pickup:</b> ${ride.pickup_loc}</p>
                        <p><b>Drop:</b> ${ride.drop_loc}</p>
                        <p style="margin-top:8px; font-size:12px; color:#888;">#B${ride.id} | ${new Date(ride.created_at).toLocaleString()}</p>
                    </div>
                    ${['assigned', 'ongoing'].includes(ride.status) ? `
                        <div class="otp-display">
                            <span style="font-size:11px; color:#666; text-transform:uppercase; font-weight:700;">Ride Verification OTP</span>
                            <span class="otp-val">${ride.journey_otp}</span>
                            <p style="font-size:11px; margin-top:4px; color:#888;">Share only with your verified captain</p>
                        </div>
                        <div style="margin-top:20px; padding-top:20px; border-top:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <p style="font-size:12px; color:#666;">CAPTAIN</p>
                                <p><b>${ride.driver_name || 'Assigning...'}</b></p>
                            </div>
                            <a href="https://www.google.com/maps/dir/?api=1&origin=${ride.pickup_coords.split(',').reverse().join(',')}&destination=${ride.drop_coords.split(',').reverse().join(',')}" target="_blank" class="btn btn-primary" style="padding:10px 20px; text-decoration:none; font-size:13px;">Live Map</a>
                        </div>
                    ` : ''}
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('profile-form').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                userId: user.id,
                name: document.getElementById('p-name').value,
                email: document.getElementById('p-email').value,
                phone: document.getElementById('p-phone').value
            };
            
            const res = await fetch(`${API_BASE_URL}/api/user/update-profile`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            if (res.ok) {
                alert('Profile updated! Logging out to refresh session.');
                logout();
            }
        };

        function logout() {
            localStorage.removeItem('cityride_member');
            window.location.href = 'index.html';
        }

        loadRides();
        setInterval(loadRides, 10000);
    </script>
</body>
</html>
